format_version: 10

pipelines:
  RoboShop_TerraformDestroy:
    group: defaultGroup
    label_template: ${COUNT}
    lock_behavior: none
    display_order: -1

    materials:
      ansible:
        git: https://github.com/krndevops/roboshop-terraform.git
        shallow_clone: false
        auto_update: true
        branch: main

    stages:

      - DEV:
          fetch_materials: true
          clean_workspace: false

          approval:
            type: manual

          jobs:
            deployment:
              timeout: 0

              tasks:

                - exec:
                    command: terraform
                    arguments:
                      [
                        "init",
                        "-backend-config=env-dev/state.tfvars"
                      ]

                - exec:
                    command: terraform
                    arguments:
                      [
                        "destroy",
                        "-target=module.eks",
                        "-var-file=env-dev/main.tfvars",
                        "-auto-approve"
                      ]

                - exec:
                    command: sleep
                    arguments: [ "60" ]

                - exec:
                    command: terraform
                    arguments:
                      [
                        "destroy",
                        "-var-file=env-dev/main.tfvars",
                        "-auto-approve"
                      ]

